<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizador de Cinema em Casa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Pipoteca🍿</h1>
    <p>Organize sua noite de cinema em casa</p>
  </header>

<div class="layout-com-banners">
  <aside class="banner banner-left">
    <div class="banner-track banner-track-up"></div>
  </aside>

  <main>
    <section id="form-section">
      <h2 id="form-title">Agendar Novo Filme</h2>
      
      <input type="hidden" id="item-id">

      <label for="input-title">Nome do Filme:</label>
      <div class="input-wrapper">
        <input type="text" id="input-title" placeholder="Ex: Interestelar, Matrix...">
        <div id="sugestoes-dropdown" class="sugestoes-dropdown"></div>
      </div>
      <p class="add-sugestao-link">Não encontrou seu filme? <span onclick="adicionarSugestao()">Adicionar às sugestões</span></p>
      <br>
      <div class="input-group">
        <label for="input-date">Data da Sessão:</label>
        <input type="text" id="input-date" placeholder="Ex: Sábado às 20h00">
      </div>
      <br>
      <button id="btn-salvar" onclick="salvarFilme()">Agendar Filme</button>
    </section>

    <section id="list-section">
      <h2>📅 Seus Filmes Agendados</h2>
      <ul id="lista-filmes">
        </ul>
    </section>
      <div id="modal-sugestao" class="modal-overlay">
        <div class="modal-conteudo">
          <h3>Adicionar novo filme</h3>
          <p>Digite o nome do filme para adicionar às sugestões:</p>
          <input type="text" id="input-modal-filme" placeholder="Nome do filme">
          <div class="modal-botoes">
            <button id="btn-modal-cancelar">Cancelar</button>
            <button id="btn-modal-add">Adicionar</button>
          </div>
        </div>
      </div>
  </main>
  

    <aside class="banner banner-right">
          <div class="banner-track banner-track-down"></div>
        </aside>
      </div>
  <script src="js/banner.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', montarBanners);
</script>
  <script src="js/filmes_sugestao.js"></script>
</body>
</html>
