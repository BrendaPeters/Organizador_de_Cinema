<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizador de Cinema em Casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gasoek+One&family=Pixelify+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Pipoteca</h1>
    <p>Organize sua noite de cinema em casa</p>
    <button id="btn-api">Dados da API</button>
  </header>

  <div class="layout-com-banners">
    <aside class="banner banner-left">
      <div class="banner-track banner-track-up"></div>
    </aside>

    <main>
      <section id="section-calendario">
        <h2>Calendário de Sessões</h2>
        <div id="calendario-container"></div>
      </section>

      <section id="list-section">
        <h2>Filmes Agendados</h2>
        <ul id="lista-filmes"></ul>
      </section>

      <section class="comentarios-section">
        <h2 class="comentarios-titulo">Comentários</h2>
        <div id="comentarios-container" class="comentarios-container"></div>
      </section>
    </main>

    <aside class="banner banner-right">
      <div class="banner-track banner-track-down"></div>
    </aside>
  </div>

  <div id="modal-api" class="modal-overlay">
    <div class="modal-conteudo modal-api-conteudo">
      <button id="fechar-api" class="modal-fechar-api">x</button>
      <h3>Painel da API</h3>
      <p class="modal-api-sub">Uso da API com fetch</p>
      <button id="btn-carregar-api" class="btn-api-carregar">Carregar Usuários</button>
      <div id="api-resultado" class="dados-api"></div>
    </div>
  </div>


  <script src="js/banner.js"></script>
  <script src="js/filmes_sugestao.js"></script>
  <script src="js/calendario.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
